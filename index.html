<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c15;--panel:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.09);--gold:#f0b429;--orange:#f97316;--dim:#9ca3af;--success:#22c55e;--text:#f1f5f9;--red:#ef4444;--indigo:#818cf8;--team:#e2e8f0;--sub:#94a3b8}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',Impact,sans-serif}
.hidden{display:none!important}
#loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.hdr{background:#0d1220;padding:16px;text-align:center;border-bottom:1px solid var(--border)}
.hdr h1{font-size:clamp(18px,4vw,42px);font-weight:900;letter-spacing:5px;text-transform:uppercase;line-height:1;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{color:var(--dim);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-top:3px}
/* Round selector */
.round-tabs{display:flex;justify-content:center;gap:6px;padding:8px;background:#0a0f1a;border-bottom:1px solid var(--border)}
.round-tab{padding:6px 20px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;background:transparent;color:var(--dim);transition:all 0.15s}
.round-tab.act{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;border-color:transparent}
.nav{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;justify-content:center}
.nav button{padding:5px 14px;border-radius:4px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:rgba(255,255,255,0.07);color:var(--dim)}
.nav button.act{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000}
.layout{display:flex;min-height:500px}
.sb{width:210px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:rgba(0,0,0,0.3);padding:10px 8px;height:calc(100vh - 130px);position:sticky;top:0}
.sb-title{font-size:10px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;font-weight:700}
.sb-tabs{display:flex;gap:2px;margin-bottom:6px}
.sb-tab{flex:1;padding:3px 0;border-radius:3px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:9px;letter-spacing:1px;text-transform:uppercase;background:rgba(255,255,255,0.06);color:var(--dim)}
.sb-tab.act{background:rgba(240,180,41,0.2);color:var(--gold)}
.pos-btns{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px}
.pos-btn{padding:2px 5px;border-radius:3px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:9px;background:rgba(255,255,255,0.06);color:var(--dim)}
.pos-btn.act{background:rgba(240,180,41,0.2);color:var(--gold)}
.srch{width:100%;padding:5px 8px;font-size:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:5px;color:var(--text);font-family:inherit;margin-bottom:6px;outline:none}
.prospect{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:5px;cursor:grab;user-select:none;margin-bottom:2px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07)}
.prospect.used{opacity:0.3;cursor:default;background:transparent;border-color:transparent}
.prospect.top50{border-left:2px solid var(--gold)}
.rk{font-size:9px;color:var(--dim);width:18px;text-align:right;flex-shrink:0}
.pbadge{font-size:9px;font-weight:700;padding:1px 3px;border-radius:2px;flex-shrink:0}
.pname{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.psch{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.content{flex:1;overflow-y:auto;padding:12px}
.lock-banner{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:6px;margin-bottom:10px}
.lb-open{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.3)}
.lb-locked{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.3)}
.pick-row{display:grid;grid-template-columns:28px minmax(0,1fr) minmax(0,1.4fr);gap:8px;align-items:center;padding:4px 6px;border-radius:6px;margin-bottom:3px;border:1px solid var(--border);background:transparent;transition:background 0.1s}
.pick-row.over{border:1px dashed var(--gold);background:rgba(240,180,41,0.06)}
.pick-row.ex-r{background:rgba(34,197,94,0.06)}
.pick-row.oo-r{background:rgba(240,180,41,0.06)}
.pick-row.to-r{background:rgba(251,146,60,0.05)}
.pick-row.ir-r{background:rgba(99,102,241,0.06)}
.pnum{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#1a243c,#243060);border:1px solid rgba(240,180,41,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.pnum.filled{background:linear-gradient(135deg,#1a3c2a,#1e4d35);border-color:rgba(34,197,94,0.3);color:var(--success)}
.team-cell{display:flex;align-items:center;gap:5px;min-width:0}
.team-cell img{width:24px;height:24px;object-fit:contain;flex-shrink:0}
.team-name{font-size:11px;font-weight:700;color:var(--team);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-via{font-size:9px;color:var(--sub)}
.slot-filled{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;border-radius:5px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);font-size:12px;font-weight:600}
.slot-filled.ex-s{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25)}
.slot-filled.oo-s{background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.25)}
.slot-filled.to-s{background:rgba(251,146,60,0.08);border-color:rgba(251,146,60,0.22)}
.slot-filled.ir-s{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.25)}
.slot-empty{padding:5px 10px;border-radius:5px;font-size:11px;color:var(--dim);border:1px dashed rgba(255,255,255,0.1);text-align:center}
.admin-inp{width:100%;padding:4px 8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:5px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.admin-inp:focus{border-color:rgba(240,180,41,0.5)}
.sbadge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.sb-ex{background:rgba(34,197,94,0.2);color:var(--success)}
.sb-1o{background:rgba(240,180,41,0.2);color:var(--gold)}
.sb-2o{background:rgba(251,146,60,0.2);color:#fb923c}
.sb-ir{background:rgba(99,102,241,0.2);color:var(--indigo)}
.score-card{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.3);border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.score-big{font-size:40px;font-weight:700;color:var(--gold);line-height:1}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.center-content{max-width:460px;margin:0 auto;padding:16px}
.inp{width:100%;padding:8px 12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.btn{padding:8px 18px;border-radius:5px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#fff}
.btn-or{background:var(--orange)}.btn-gr{background:var(--success)}.btn-dk{background:#1e293b;color:#888}
.btn-in{background:#4f46e5}.btn-gy{background:#374151;color:#aaa}.btn-re{background:var(--red)}

.fetch-log{margin-top:10px;padding:8px 12px;border-radius:6px}
.fetch-ok{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2)}
.fetch-err{background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.25)}
.auto-toggle{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:6px;border:1px solid var(--border)}
.toggle-sw{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.toggle-sl{position:absolute;cursor:pointer;inset:0;background:#374151;border-radius:20px;transition:0.3s}
.toggle-sl:before{content:"";position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.3s}
.toggle-sw input:checked+.toggle-sl{background:#22c55e}
.toggle-sw input:checked+.toggle-sl:before{transform:translateX(16px)}
/* User management */
.user-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:6px;margin-bottom:4px;background:rgba(255,255,255,0.03);border:1px solid var(--border)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:4px 8px}
th{color:var(--dim);border-bottom:1px solid var(--border);text-align:left}
td{border-bottom:1px solid rgba(255,255,255,0.04)}

// ─── SCORING ─────────────────────────────────────────────────────────────────
const SCORE={exact:100,oneOff:50,twoOff:20,inRound:10};
function calcScore(picks,actual,round){
  round=round||ST.round;
  if(!actual||!Object.keys(actual).length)return{total:0,bd:[]};
  let total=0;const bd=[];
  const vals=Object.values(actual).filter(Boolean);
  const draftOrder=DRAFT_ORDERS[round]||DRAFT_ORDERS[1];
  for(let i=0;i<draftOrder.length;i++){
    const pick=draftOrder[i].pick;
    const p=picks[pick],t=actual[pick];
    if(!p?.trim())continue;
    const pl=p.trim().toLowerCase();
    const prev=actual[draftOrder[i-1]?.pick];
    const next=actual[draftOrder[i+1]?.pick];
    const prev2=actual[draftOrder[i-2]?.pick];
    const next2=actual[draftOrder[i+2]?.pick];
    if(t&&pl===t.trim().toLowerCase()){total+=SCORE.exact;bd.push({pick,pts:SCORE.exact,lbl:"ex"});}
    else if(t&&(prev?.trim().toLowerCase()===pl||next?.trim().toLowerCase()===pl)){total+=SCORE.oneOff;bd.push({pick,pts:SCORE.oneOff,lbl:"1o"});}
    else if(t&&(prev2?.trim().toLowerCase()===pl||next2?.trim().toLowerCase()===pl)){total+=SCORE.twoOff;bd.push({pick,pts:SCORE.twoOff,lbl:"2o"});}
    else if(vals.some(v=>v.trim().toLowerCase()===pl)){total+=SCORE.inRound;bd.push({pick,pts:SCORE.inRound,lbl:"ir"});}
  }
  return{total,bd};
}
function getScores(){
  const ap=ST.allPicks[ST.round]||{};
  const act=ST.actual[ST.round]||{};
  return Object.entries(ap).map(([n,p])=>({name:n,...calcScore(p,act)})).sort((a,b)=>b.total-a.total);
}
function getTotalScores(){
  // Combined across all rounds
  const users=new Set();
  [1,2,3].forEach(r=>Object.keys(ST.allPicks[r]||{}).forEach(u=>users.add(u)));
  return Array.from(users).map(name=>{
    let total=0,ex=0,oo=0,to=0,ir=0;
    [1,2,3].forEach(r=>{
      const sc=calcScore((ST.allPicks[r]||{})[name]||{},ST.actual[r]||{},r);
      total+=sc.total;ex+=sc.bd.filter(b=>b.lbl==="ex").length;
      oo+=sc.bd.filter(b=>b.lbl==="1o").length;to+=sc.bd.filter(b=>b.lbl==="2o").length;ir+=sc.bd.filter(b=>b.lbl==="ir").length;
    });
    return{name,total,ex,oo,to,ir};
  }).sort((a,b)=>b.total-a.total);
}

// ─── ESPN FETCH ───────────────────────────────────────────────────────────────
async function fetchLive(){
  const round=ST.round;
  // Multiple ESPN endpoints to try - they changed structure between years
  const ENDPOINTS=[
    `https://site.api.espn.com/apis/site/v2/sports/football/nfl/draft?year=2026&round=${round}&limit=70`,
    `https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/draft/2026?limit=100`,
    `https://site.api.espn.com/apis/site/v2/sports/football/nfl/draft/2026?round=${round}`,
    `https://site.api.espn.com/apis/site/v2/sports/football/nfl/draft?season=2026&seasontype=2&round=${round}`,
  ];
  const PROXY="https://api.allorigins.win/raw?url=";
  let data=null;
  let lastErr="";

  // Try each endpoint directly, then via proxy
  for(const url of ENDPOINTS){
    // Direct
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(6000),headers:{Accept:"application/json"}});
      if(r.ok){data=await r.json();break;}
    }catch(e){lastErr=e.message;}
    // Via proxy
    try{
      const r=await fetch(PROXY+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
      if(r.ok){data=await r.json();break;}
    }catch(e){lastErr=e.message;}
  }

  if(!data)throw new Error(`Cannot reach ESPN. Use the Bulk Paste box below to enter picks manually — paste from ESPN.com or NFL.com (${lastErr})`);

  // Parse ESPN response - handle multiple possible structures
  let picksArr=[];
  // Try all known ESPN response shapes
  if(Array.isArray(data.picks))picksArr=data.picks;
  else if(data.rounds&&Array.isArray(data.rounds)){
    // find the right round
    const rd=data.rounds.find(r=>r.round===round||r.roundNumber===round)||data.rounds[round-1];
    if(rd)picksArr=rd.picks||rd.selections||[];
  }
  else if(data.items&&Array.isArray(data.items))picksArr=data.items;
  else if(data.selections&&Array.isArray(data.selections))picksArr=data.selections;
  else if(data.athletes&&Array.isArray(data.athletes))picksArr=data.athletes;
  else{
    // Try to find any array of picks in the response
    for(const key of Object.keys(data)){
      if(Array.isArray(data[key])&&data[key].length>0&&(data[key][0]?.athlete||data[key][0]?.player||data[key][0]?.pickOverall||data[key][0]?.overall)){
        picksArr=data[key];break;
      }
    }
  }

  if(!picksArr.length){
    const preview=JSON.stringify(data).slice(0,300);
    console.log("ESPN response:",preview);
    throw new Error(`Round ${round} picks not available yet — Round 2 starts at 7 PM ET tonight. Check back once picks are announced! (Debug: ${preview})`);
  }

  const result={},tradeInfo={},teamInfo={};
  picksArr.forEach(p=>{
    // Pick number - try every possible field name
    const n=parseInt(
      p.pickOverall||p.overall||p.overallPick||p.pick||p.pickNumber||
      p.number||p.id||p.selection||0
    );
    if(!n||n>300)return;

    // Player name - try every possible field
    let name="";
    if(p.athlete?.fullName)name=p.athlete.fullName;
    else if(p.player?.fullName)name=p.player.fullName;
    else if(p.athlete?.displayName)name=p.athlete.displayName;
    else if(p.player?.displayName)name=p.player.displayName;
    else if(p.athlete?.firstName&&p.athlete?.lastName)name=p.athlete.firstName+" "+p.athlete.lastName;
    else if(p.player?.firstName&&p.player?.lastName)name=p.player.firstName+" "+p.player.lastName;
    else if(p.firstName&&p.lastName)name=p.firstName+" "+p.lastName;
    else if(p.displayName)name=p.displayName;
    else if(p.fullName)name=p.fullName;
    else if(p.name)name=p.name;
    name=name.trim();
    if(!name||name==="undefined undefined"||name===" ")return;

    result[n]=name;

    // Team info
    const teamName=p.team?.displayName||p.team?.name||p.team?.shortDisplayName||"";
    const origTeam=p.originalTeam?.displayName||p.fromTeam?.displayName||p.tradedFrom?.displayName||"";
    if(teamName)teamInfo[n]={team:teamName,ab:teamToAbbr(teamName)};
    if(origTeam&&origTeam.toLowerCase()!==teamName.toLowerCase())tradeInfo[n]=origTeam;
  });

  if(!Object.keys(result).length){
    // Log what we got for debugging
    console.log("Picks array sample:",JSON.stringify(picksArr.slice(0,2)));
    throw new Error(`Got ${picksArr.length} picks from ESPN but couldn't parse player names. The API structure may have changed. Enter picks manually.`);
  }

  return{result,tradeInfo,teamInfo};
}

    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of[children].flat().filter(Boolean))e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  return e;
}

function buildPickRow(slot,picks,actual,isAdmin){
  const{pick}=slot;
  const hasA=Object.keys(actual).length>0;
  const score=hasA?calcScore(picks,actual):null;
  const se=score?score.bd.find(b=>b.pick===pick):null;
  const filled=(picks[pick]||"").trim();
  const readOnly=!isAdmin&&isRoundLocked(ST.round);
  const rowCls=`pick-row${se?se.lbl==="ex"?" ex-r":se.lbl==="1o"?" oo-r":se.lbl==="2o"?" to-r":" ir-r":""}`;
  const row=el("div",{class:rowCls});
  if(!readOnly){
    row.addEventListener("dragover",e=>{e.preventDefault();row.classList.add("over");});
    row.addEventListener("dragleave",()=>row.classList.remove("over"));
    row.addEventListener("drop",()=>{
      row.classList.remove("over");
      if(ST.dragName){if(isAdmin)ST.adminPicks[pick]=ST.dragName;else ST.myPicks[pick]=ST.dragName;ST.dragName=null;render();}
    });
  }
  row.appendChild(el("div",{class:`pnum${filled?" filled":""}`},[String(pick)]));
  row.appendChild(teamCell(slot,true));
  if(isAdmin){
    const inp=el("input",{class:"admin-inp",type:"text",placeholder:"Type any player name…"});
    inp.value=filled;
    inp.addEventListener("input",e=>{ST.adminPicks[pick]=e.target.value;});
    row.appendChild(inp);
  }else if(filled){
    const sCls=`slot-filled${se?se.lbl==="ex"?" ex-s":se.lbl==="1o"?" oo-s":se.lbl==="2o"?" to-s":" ir-s":""}`;
    const s2=el("div",{class:sCls});

async function saveMyPicks(){

async function saveActual(){

async function deleteUser(userName){
  if(!confirm(`Delete ALL picks for "${userName}" across all rounds? This cannot be undone.`))return;
  // Remove from local state
  [1,2,3].forEach(r=>{const ap={...(ST.allPicks[r]||{})};delete ap[userName];ST.allPicks[r]=ap;});
  // Remove from Firebase / localStorage

  }

// Force-reload all users from Firebase (useful when user manager shows empty)
async function reloadAllUsers(){
  if(!ST.fbOk||!_getDocs)return;
  try{
    for(const r of [1,2,3]){
      const colName=r===1?"picks":`picks_r${r}`;
      const snap=await _getDocs(_col(_db,colName));
      const all={};snap.forEach(d=>{all[d.id]=d.data().picks||{};});
      if(r===1){
        try{const s2=await _getDocs(_col(_db,"picks_r1"));s2.forEach(d=>{all[d.id]=d.data().picks||{};});}catch{}
      }
      ST.allPicks[r]=all;
    }
    render();
  }catch(e){console.error("reloadAllUsers:",e);}
}
async function doFetch(silent=false){
  ST.fetching=true;if(!silent){ST.fetchLog=null;ST.showConfirm=false;}render();
  try{
    const{result,tradeInfo,teamInfo}=await fetchLive();
    if(teamInfo){
      const draftOrder=DRAFT_ORDERS[ST.round]||[];
      draftOrder.forEach(slot=>{
        const ti=teamInfo[slot.pick];
        if(ti&&ti.ab&&ti.ab!=="nfl"){slot._actualTeam=ti.team;slot._actualAb=ti.ab;slot._tradedFrom=tradeInfo[slot.pick]||null;}
      });
    }
    const slots=[];const merged={...ST.adminPicks};
    for(const[k,v]of Object.entries(result)){
      const n=parseInt(k);
      if(!merged[n]||!merged[n].trim()){merged[n]=v;slots.push({pick:n,name:v,isNew:true});}
      else if(merged[n].trim().toLowerCase()!==v.trim().toLowerCase()){slots.push({pick:n,name:v,was:merged[n],isNew:false});}
    }
    if(!slots.length){ST.fetchLog={noChanges:true,ts:new Date().toLocaleTimeString()};}
    else if(silent){
      ST.adminPicks=merged;ST.actual[ST.round]={...merged};
      if(ST.fbOk)fbSaveActual(ST.round,merged).catch(()=>{});
      else{try{localStorage.setItem(`actual_r${ST.round}`,JSON.stringify(merged));}catch{}}
      ST.fetchLog={newCount:slots.filter(s=>s.isNew).length,slots,ts:new Date().toLocaleTimeString()};
    }else{ST.fetchPreview={merged,slots};ST.showConfirm=true;}
  }catch(e){ST.fetchLog={error:e.message,ts:new Date().toLocaleTimeString()};}
  ST.fetching=false;render();
}
async function confirmFetch(){
  if(!ST.fetchPreview)return;
  ST.adminPicks=ST.fetchPreview.merged;ST.actual[ST.round]={...ST.adminPicks};
  if(ST.fbOk)await fbSaveActual(ST.round,ST.adminPicks);
  else{try{localStorage.setItem(`actual_r${ST.round}`,JSON.stringify(ST.adminPicks));}catch{}}
  ST.fetchLog={newCount:ST.fetchPreview.slots.filter(s=>s.isNew).length,slots:ST.fetchPreview.slots,ts:new Date().toLocaleTimeString()};
  ST.fetchPreview=null;ST.showConfirm=false;render();
}

      const ttd=el("td");ttd.appendChild(teamCell({team,via,ab},true));tr.appendChild(ttd);
      const atd=el("td");atd.textContent=(ST.actual[ST.round]||{})[pick]||"—";tr.appendChild(atd);
      scores.forEach(sc=>{const hit=sc.bd.find(b=>b.pick===pick);const td=el("td",{style:{textAlign:"center"}});
        if(hit){td.textContent=`+${hit.pts}`;td.style.color=hit.lbl==="ex"?"var(--success)":hit.lbl==="1o"?"var(--gold)":hit.lbl==="2o"?"#fb923c":"var(--indigo)";}
        else{td.textContent=(ST.allPicks[ST.round]||{})[sc.name]?.[pick]||"—";td.style.color="#2d3748";}tr.appendChild(td);
      });tb.appendChild(tr);
    });tbl.appendChild(tb);tc.appendChild(tbl);wrap.appendChild(tc);
  }
  root.appendChild(wrap);return root;
}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function renderAdmin(){
  const root=el("div");
  root.appendChild(el("div",{class:"hdr"},[el("h1",{},["🏈 NFL Draft Pick'em 2026"]),el("p",{},["Admin — Live Tracker"])]));
  root.appendChild(renderRoundTabs());
  const layout=el("div",{class:"layout"});
  const sb=el("div",{class:"sb"});buildSidebar(sb,true);layout.appendChild(sb);
  const content=el("div",{class:"content"});

  // ── Fetch Panel ──
  const fp=el("div",{class:"fetch-panel"});
  const fptop=el("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px",flexWrap:"wrap"}});
  const fpleft=el("div",{style:{flex:"1"}});
  fpleft.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"800",color:"var(--indigo)",marginBottom:"3px"}},[`📡 ROUND ${ST.round} FETCH`]));
  fpleft.appendChild(el("div",{style:{fontSize:"11px",color:"var(--dim)",lineHeight:"1.5"}},["Uses ESPN live draft API. Works from any browser. Shows preview before saving."]));
  const pa=Object.values(ST.adminPicks).filter(Boolean).length;
  if(pa)fpleft.appendChild(el("div",{style:{fontSize:"11px",color:"var(--dim)",marginTop:"4px"}},[`Tracking: `,el("span",{style:{color:"var(--gold)",fontWeight:"700"}},[`${pa} picks`])]));
  fptop.appendChild(fpleft);
  const fetchBtn=el("button",{class:`btn ${ST.fetching?"btn-gy":"btn-in"}`,onClick:()=>doFetch(false)});
  fetchBtn.style.cssText="display:flex;align-items:center;gap:6px;padding:10px 18px;font-size:13px";
  fetchBtn.innerHTML=ST.fetching?`<span class="spin">⟳</span> Fetching…`:`🔄 Fetch Round ${ST.round}`;
  if(ST.fetching)fetchBtn.disabled=true;
  fptop.appendChild(fetchBtn);fp.appendChild(fptop);

  // Auto-refresh toggle
  const at=el("div",{class:"auto-toggle"});
  const label=el("label",{style:{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer",flex:"1"}});
  const sw=el("label",{class:"toggle-sw"});
  const cb=el("input",{type:"checkbox"});cb.checked=ST.autoRefresh;
  cb.addEventListener("change",e=>{ST.autoRefresh=e.target.checked;if(ST.autoRefresh)startAutoRefresh();else stopAutoRefresh();render();});
  sw.appendChild(cb);sw.appendChild(el("span",{class:"toggle-sl"}));
  label.appendChild(sw);
  const atxt=el("div");
  atxt.appendChild(el("div",{style:{fontSize:"12px",fontWeight:"700",color:ST.autoRefresh?"var(--success)":"var(--dim)"}},[ST.autoRefresh?"🤖 Auto-refresh ON (every 30s)":"Auto-refresh OFF"]));
  atxt.appendChild(el("div",{style:{fontSize:"10px",color:"var(--dim)"}},[ST.autoRefresh?"Fetching automatically every 30 seconds":"Toggle to auto-fetch every 30 seconds"]));
  label.appendChild(atxt);at.appendChild(label);fp.appendChild(at);

  if(ST.fetchLog){
    const fl=el("div",{class:`fetch-log ${ST.fetchLog.error?"fetch-err":"fetch-ok"}`});
    if(ST.fetchLog.error){fl.appendChild(el("div",{style:{fontSize:"11px",color:"var(--red)",fontWeight:"700",lineHeight:"1.4"}},[`⚠ ${ST.fetchLog.ts}: ${ST.fetchLog.error}`]));}
    else if(ST.fetchLog.noChanges){fl.appendChild(el("div",{style:{fontSize:"11px",color:"var(--dim)"}},[`✓ No new picks at ${ST.fetchLog.ts}`]));}
    else{
      fl.appendChild(el("div",{style:{fontSize:"11px",color:"var(--success)",fontWeight:"700"}},[`✓ ${ST.fetchLog.newCount} new pick${ST.fetchLog.newCount!==1?"s":""} at ${ST.fetchLog.ts}`]));
      (ST.fetchLog.slots||[]).slice(0,4).forEach(s=>{fl.appendChild(el("div",{style:{fontSize:"10px",color:"var(--dim)",marginTop:"2px"}},[`#${s.pick} → ${s.name}`]));});
    }
    fp.appendChild(fl);
  }
  content.appendChild(fp);

  // ── Manual bulk paste panel ──
  const bp=el("div",{style:{background:"rgba(255,255,255,0.03)",border:"1px solid var(--border)",borderRadius:"8px",padding:"12px",marginBottom:"14px"}});
  bp.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"800",color:"var(--dim)",letterSpacing:"2px",marginBottom:"6px"}},["📋 BULK PASTE (if fetch fails)"]));
  bp.appendChild(el("div",{style:{fontSize:"10px",color:"var(--dim)",marginBottom:"8px",lineHeight:"1.5"}},["Paste picks in format: \"33. Player Name\" or \"33: Player Name\" or one per line. Numbers must match pick numbers."]));
  const bpArea=el("textarea",{style:{width:"100%",height:"80px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"5px",color:"var(--text)",fontSize:"11px",fontFamily:"monospace",padding:"6px 8px",outline:"none",resize:"vertical"}});
  bpArea.placeholder=`e.g.\n33. Jermod McCoy\n34. Treydan Stukes\n35. Harold Perkins Jr.`;
  bp.appendChild(bpArea);
  const bpBtn=el("button",{class:"btn btn-or btn-sm",style:{marginTop:"8px"},onClick:()=>{
    const lines=bpArea.value.split("\n").filter(Boolean);
    let count=0;
    lines.forEach(line=>{
      // Match patterns: "33. Name", "33: Name", "33) Name", "#33 Name", just "Name" (sequential)
      const m=line.match(/^[#\s]*?(\d+)[.:\)\s]+(.+)$/);
      if(m){const n=parseInt(m[1]),name=m[2].trim();if(n>=1&&n<=300&&name){ST.adminPicks[n]=name;count++;}}
    });
    if(count>0){bpArea.value="";render();}else{alert("Couldn't parse any picks. Use format: \"33. Player Name\"");}
  }});
  bpBtn.textContent="Apply Pasted Picks";
  bp.appendChild(bpBtn);
  bp.appendChild(el("span",{style:{fontSize:"10px",color:"var(--dim)",marginLeft:"8px"}},["Then click Save to Scoreboard"]));
  content.appendChild(bp);

  // ── User Management ──
  const umToggle=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}});
  umToggle.appendChild(el("div",{style:{fontSize:"10px",color:"var(--dim)",letterSpacing:"2px"}},["PICKS — type any player name or drag from sidebar"]));
  const umBtn=el("button",{class:"btn btn-dk btn-sm",onClick:async()=>{
    ST.showUserMgmt=!ST.showUserMgmt;
    if(ST.showUserMgmt){
      // Always do a fresh direct read from Firebase when opening user manager
      if(ST.fbOk&&_getDocs){
        try{
          for(const r of[1,2,3]){
            // R1 may be in old "picks" collection OR new "picks_r1"
            const colName=r===1?"picks":`picks_r${r}`;
            const snap=await _getDocs(_col(_db,colName));
            const all={};snap.forEach(d=>{all[d.id]=d.data().picks||{};});
            // Also try the new collection name for R1 and merge
            if(r===1){
              try{
                const snap2=await _getDocs(_col(_db,"picks_r1"));
                snap2.forEach(d=>{all[d.id]={...all[d.id],...(d.data().picks||{})};});
              }catch{}
            }
            ST.allPicks[r]=all;
          }
        }catch(e){console.error("Load users:",e);}
      }
    }
    render();
  }});
  umBtn.textContent=ST.showUserMgmt?"Hide User Manager":"👤 Manage Users";
  umToggle.appendChild(umBtn);content.appendChild(umToggle);

  if(ST.showUserMgmt){
    const um=el("div",{style:{background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:"8px",padding:"12px",marginBottom:"12px"}});
    um.appendChild(el("div",{style:{fontSize:"11px",color:"var(--red)",fontWeight:"700",marginBottom:"4px"}},["⚠ USER MANAGEMENT — Delete removes picks from ALL rounds"]));
    // Collect users from all rounds in ST.allPicks
    const allUsers=new Set();
    [1,2,3].forEach(r=>Object.keys(ST.allPicks[r]||{}).forEach(u=>allUsers.add(u)));
    if(!allUsers.size){
      // Firebase may still be loading - show a refresh button
      const noUsers=el("div",{style:{color:"var(--dim)",fontSize:"11px",marginTop:"8px"}});
      noUsers.textContent="No users loaded yet. ";
      const refreshBtn=el("button",{class:"btn btn-dk btn-sm",style:{marginLeft:"6px"},onClick:()=>render()});
      refreshBtn.textContent="🔄 Refresh";
      noUsers.appendChild(refreshBtn);
      if(ST.fbOk){
        const reloadBtn=el("button",{class:"btn btn-in btn-sm",style:{marginLeft:"6px"},onClick:()=>reloadAllUsers()});
        reloadBtn.textContent="⬇ Load from Firebase";
        noUsers.appendChild(reloadBtn);
      }
      // Also try to show any users we know about from allPicks directly
      const hint=el("div",{style:{fontSize:"10px",color:"var(--dim)",marginTop:"4px"}});
      hint.textContent=`Picks loaded: R1=${Object.keys(ST.allPicks[1]||{}).length} R2=${Object.keys(ST.allPicks[2]||{}).length} R3=${Object.keys(ST.allPicks[3]||{}).length} users`;
      um.appendChild(noUsers);
      um.appendChild(hint);
    }
    allUsers.forEach(user=>{
      const row=el("div",{class:"user-row"});
      const nameEl=el("div",{style:{flex:"1"}});
      nameEl.appendChild(el("span",{style:{fontWeight:"700",fontSize:"13px"}},[user]));
      nameEl.appendChild(el("div",{style:{fontSize:"10px",color:"var(--dim)",marginTop:"2px"}},[
        `R1: ${Object.keys((ST.allPicks[1]||{})[user]||{}).length} picks · ` +
        `R2: ${Object.keys((ST.allPicks[2]||{})[user]||{}).length} picks · ` +
        `R3: ${Object.keys((ST.allPicks[3]||{})[user]||{}).length} picks`
      ]));
      row.appendChild(nameEl);
      const delBtn=btn("🗑 Delete","btn-re btn-sm",()=>deleteUser(user));
      row.appendChild(delBtn);
      um.appendChild(row);
    });
    content.appendChild(um);
  }

  // ── Pick Grid ──
  const draftOrder=DRAFT_ORDERS[ST.round]||[];
  draftOrder.forEach(slot=>content.appendChild(buildPickRow(slot,ST.adminPicks,ST.actual[ST.round]||{},true)));

  const brow=el("div",{style:{marginTop:"16px",display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}});
  brow.appendChild(btn(ST.saved?"✓ Saved!":"💾 Save to Scoreboard",ST.saved?"btn-gr":"btn-or",saveActual));
  brow.appendChild(btn("← Back","btn-dk",()=>{ST.user=null;ST.view="home";render();}));
  brow.appendChild(el("span",{style:{fontSize:"10px",color:"var(--dim)"}},["Fetch auto-saves · Manual edits need Save"]));
  content.appendChild(brow);
  layout.appendChild(content);root.appendChild(layout);return root;
}

// ─── CONFIRM MODAL ────────────────────────────────────────────────────────────
function renderModal(){
  const mr=document.getElementById("modal-root");mr.innerHTML="";
  if(!ST.showConfirm||!ST.fetchPreview)return;
  const bg=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",zIndex:"1000",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}});
  const modal=el("div",{style:{background:"#0f1623",border:"1px solid var(--gold)",borderRadius:"10px",padding:"20px",maxWidth:"500px",width:"100%",maxHeight:"75vh",overflowY:"auto"}});
  modal.appendChild(el("div",{style:{fontSize:"14px",fontWeight:"800",color:"var(--gold)",letterSpacing:"2px",marginBottom:"4px"}},[`ROUND ${ST.round} FETCH PREVIEW`]));
  modal.appendChild(el("div",{style:{fontSize:"11px",color:"var(--dim)",marginBottom:"12px"}},[`Found ${ST.fetchPreview.slots.length} change${ST.fetchPreview.slots.length!==1?"s":""}:`]));
  const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"5px",marginBottom:"16px"}});
  const draftOrder=DRAFT_ORDERS[ST.round]||[];
  ST.fetchPreview.slots.forEach(s=>{
    const slotData=draftOrder.find(o=>o.pick===s.pick);
    const r=el("div",{style:`display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;background:${s.isNew?"rgba(34,197,94,0.08)":"rgba(240,180,41,0.08)"};border:1px solid ${s.isNew?"rgba(34,197,94,0.25)":"rgba(240,180,41,0.25)"}`});
    r.appendChild(el("div",{style:{width:"26px",height:"26px",borderRadius:"50%",background:"linear-gradient(135deg,#1a243c,#243060)",border:"1px solid rgba(240,180,41,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"800",color:"var(--gold)",flexShrink:"0"}},[String(s.pick)]));
    if(slotData){const img=mkImg(slotData._actualAb||slotData.ab,true);img.style.cssText="width:20px;height:20px;object-fit:contain";r.appendChild(img);}
    const info=el("div",{style:{flex:"1"}});
    info.appendChild(el("div",{style:{fontSize:"12px",fontWeight:"700"}},[s.name]));
    if(!s.isNew)info.appendChild(el("div",{style:{fontSize:"10px",color:"var(--dim)"}},[`replaces: ${s.was}`]));
    r.appendChild(info);
    r.appendChild(el("div",{style:`font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:${s.isNew?"rgba(34,197,94,0.2)":"rgba(240,180,41,0.2)"};color:${s.isNew?"var(--success)":"var(--gold)"}`},[s.isNew?"NEW":"UPDATE"]));
    list.appendChild(r);
  });
  modal.appendChild(list);
  const btns=el("div",{style:{display:"flex",gap:"8px"}});
  btns.appendChild(btn("✓ Apply All Changes","btn-gr",confirmFetch));
  btns.appendChild(btn("Discard","btn-gy",()=>{ST.fetchPreview=null;ST.showConfirm=false;render();}));
  modal.appendChild(btns);bg.appendChild(modal);mr.appendChild(bg);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener("firebase-ready",async()=>{
  ST.fbOk=window._firestoreReady===true;
  if(ST.fbOk){
    fbInit();
    [1,2,3].forEach(r=>{fbListenActual(r);fbListenPicks(r);});
  }else{
    // localStorage fallback
    try{
      [1,2,3].forEach(r=>{
        const a=localStorage.getItem(`actual_r${r}`);if(a)ST.actual[r]=JSON.parse(a);
        Object.keys(localStorage).filter(k=>k.startsWith(`picks_r${r}_`)).forEach(k=>{
          try{ST.allPicks[r][k.slice((`picks_r${r}_`).length)]=JSON.parse(localStorage.getItem(k));}catch{}
        });
      });
    }catch{}
  }
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  render();
  setInterval(()=>{render();},60000); // re-render every minute to update lock states
});
</script>
