<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NFL Draft Pick'em 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c15;--panel:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.09);
  --gold:#f0b429;--orange:#f97316;--dim:#9ca3af;--success:#22c55e;
  --text:#f1f5f9;--red:#ef4444;--indigo:#818cf8;--team:#e2e8f0;--sub:#94a3b8;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',Impact,sans-serif}
.hidden{display:none!important}
/* Loading */
#loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
/* Header */
.hdr{text-align:center;padding:20px 20px 10px;border-bottom:1px solid var(--border)}
.hdr h1{font-size:clamp(20px,4.5vw,46px);font-weight:900;letter-spacing:5px;text-transform:uppercase;line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{color:var(--dim);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-top:5px}
/* Nav */
.nav{display:flex;justify-content:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.nav button{padding:7px 18px;border-radius:4px;border:none;cursor:pointer;font-family:inherit;font-weight:700;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;background:rgba(255,255,255,0.07);color:var(--dim);transition:all 0.15s}
.nav button.active{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000}
/* Layout */
.main-layout{display:flex}
/* Sidebar */
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);padding:12px 10px;
  position:sticky;top:0;height:100vh;overflow-y:auto;background:rgba(0,0,0,0.25)}
.sidebar-title{font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;font-weight:700}
.sidebar-hint{font-size:10px;color:var(--dim);margin-bottom:8px;line-height:1.5}
.sidebar-hint.locked{color:var(--red)}
/* Search tabs */
.stabs{display:flex;gap:4px;margin-bottom:8px}
.stab{flex:1;padding:4px 0;border-radius:4px;border:none;cursor:pointer;font-family:inherit;
  font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;
  background:rgba(255,255,255,0.06);color:var(--dim);transition:all 0.15s}
.stab.active{background:rgba(240,180,41,0.15);color:var(--gold)}
/* Search box */
.srch-wrap{position:relative;margin-bottom:8px}
.srch-wrap input{padding:6px 8px 6px 28px;font-size:11px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:var(--text);width:100%;
  outline:none;font-family:inherit}
.srch-wrap input::placeholder{color:var(--dim)}
.srch-wrap::before{content:"🔍";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;pointer-events:none}
/* Prospect chips */
.prospect{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:6px;
  cursor:grab;user-select:none;margin-bottom:3px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);transition:opacity 0.15s}
.prospect.used{opacity:0.3;background:transparent;border-color:transparent;cursor:default}
.prospect.top32{border-left:2px solid var(--gold)}
.pos-badge{font-size:10px;font-weight:800;padding:1px 4px;border-radius:3px;flex-shrink:0}
.pro-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pro-sub{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Content area */
.content{flex:1;padding:18px 20px;overflow-y:auto}
.center-content{max-width:480px;margin:32px auto;padding:0 20px}
/* Cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px}
.card-gold{background:rgba(240,180,41,0.05);border:1px solid rgba(240,180,41,0.2);border-radius:10px;padding:20px;margin-bottom:14px}
/* Inputs */
input[type=text]{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;color:var(--text);padding:9px 12px;font-size:14px;
  outline:none;font-family:inherit;width:100%}
input[type=text]::placeholder{color:var(--dim)}
input[type=text]:focus{border-color:rgba(240,180,41,0.4)}
/* Buttons */
.btn{padding:9px 20px;border-radius:5px;border:none;cursor:pointer;font-family:inherit;
  font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;color:#fff}
.btn-or{background:var(--orange)}.btn-gr{background:var(--success)}.btn-dk{background:#1e293b;color:#888}
.btn-in{background:#4f46e5}.btn-gy{background:#374151;color:#aaa}.btn-re{background:var(--red)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
/* Pick rows */
.pick-row{display:grid;grid-template-columns:36px 1fr 1.6fr;gap:10px;align-items:center;
  padding:6px 8px;border-radius:7px;margin-bottom:4px;
  border:1.5px solid var(--border);transition:all 0.1s;background:transparent}
.pick-row.drop-target{border-style:dashed;border-color:var(--gold);background:rgba(240,180,41,0.07)}
.pick-row.exact-r{background:rgba(34,197,94,0.06);border-color:rgba(34,197,94,0.2)}
.pick-row.oneoff-r{background:rgba(240,180,41,0.06);border-color:rgba(240,180,41,0.2)}
.pick-row.twooff-r{background:rgba(251,146,60,0.05);border-color:rgba(251,146,60,0.15)}
.pick-row.inrnd-r{background:rgba(99,102,241,0.06);border-color:rgba(99,102,241,0.2)}
.pick-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1a243c,#243060);
  border:1px solid rgba(240,180,41,0.3);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:var(--gold);flex-shrink:0}
.pick-num.filled-num{background:linear-gradient(135deg,#1a3c2a,#1e4d35);border-color:rgba(34,197,94,0.35);color:var(--success)}
.team-cell{display:flex;align-items:center;gap:8px;min-width:0}
.team-cell img{width:30px;height:30px;object-fit:contain;flex-shrink:0}
.team-cell img.sm{width:22px;height:22px}
.team-name-main{font-size:12px;font-weight:700;color:var(--team);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-via{font-size:10px;color:var(--sub)}
.filled-slot{display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:rgba(255,255,255,0.06);font-size:13px;font-weight:600;cursor:pointer}
.filled-slot.exact-s{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3)}
.filled-slot.oneoff-s{background:rgba(240,180,41,0.10);border-color:rgba(240,180,41,0.3)}
.filled-slot.twooff-s{background:rgba(251,146,60,0.08);border-color:rgba(251,146,60,0.25)}
.filled-slot.inrnd-s{background:rgba(99,102,241,0.10);border-color:rgba(99,102,241,0.3)}
.empty-slot{padding:7px 12px;border-radius:6px;font-size:12px;color:var(--dim);
  border:1px dashed rgba(255,255,255,0.12);text-align:center}
.empty-slot.drop-target{color:var(--gold);border-color:var(--gold);background:rgba(240,180,41,0.05)}
.score-badge{font-size:11px;font-weight:800;padding:1px 7px;border-radius:10px}
.sb-ex{background:rgba(34,197,94,0.2);color:var(--success)}
.sb-1o{background:rgba(240,180,41,0.2);color:var(--gold)}
.sb-2o{background:rgba(251,146,60,0.2);color:#fb923c}
.sb-ir{background:rgba(99,102,241,0.2);color:var(--indigo)}
/* Lock banner */
.lock-banner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;
  gap:8px;padding:10px 16px;border-radius:8px;margin-bottom:14px}
.lock-open{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.3)}
.lock-locked{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#0f1623;border:1px solid var(--gold);border-radius:12px;
  padding:24px;max-width:540px;width:100%;max-height:80vh;overflow-y:auto}
/* Fetch panel */
.fetch-panel{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.3);
  border-radius:10px;padding:18px;margin-bottom:20px}
.fetch-log{margin-top:14px;padding:10px 14px;border-radius:7px}
.fetch-ok{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2)}
.fetch-err{background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.25)}
/* LB */
.lb-row{display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;border-radius:10px;margin-bottom:10px;
  background:var(--panel);border:1px solid var(--border)}
.lb-top{background:rgba(240,180,41,0.07);border-color:rgba(240,180,41,0.4)}
/* Table */
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:4px 8px}
th{color:var(--dim);border-bottom:1px solid var(--border);text-align:left}
td{border-bottom:1px solid rgba(255,255,255,0.04)}
/* Misc */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
.setup-box{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.3);
  border-radius:10px;padding:20px;margin-bottom:16px}
.setup-box code{background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:12px}
.setup-box pre{background:rgba(0,0,0,0.4);padding:12px;border-radius:6px;font-size:11px;
  font-family:monospace;overflow-x:auto;margin:8px 0;border:1px solid rgba(255,255,255,0.1)}
</style>
</head>

// SCORING
// ═══════════════════════════════════════════════════════════════════════
function calcScore(picks,actual){
  if(!actual||!Object.keys(actual).length)return{total:0,bd:[]};
  let total=0;const bd=[];
  const vals=Object.values(actual).filter(Boolean);
  for(let i=1;i<=PICKS;i++){
    const p=picks[i],t=actual[i];
    if(!p?.trim())continue;
    const pl=p.trim().toLowerCase();
    if(t&&pl===t.trim().toLowerCase()){total+=SCORE.exact;bd.push({pick:i,pts:SCORE.exact,lbl:"ex"});}
    else if(t&&(actual[i-1]?.trim().toLowerCase()===pl||actual[i+1]?.trim().toLowerCase()===pl)){total+=SCORE.oneOff;bd.push({pick:i,pts:SCORE.oneOff,lbl:"1o"});}
    else if(t&&(actual[i-2]?.trim().toLowerCase()===pl||actual[i+2]?.trim().toLowerCase()===pl)){total+=SCORE.twoOff;bd.push({pick:i,pts:SCORE.twoOff,lbl:"2o"});}
    else if(vals.some(v=>v.trim().toLowerCase()===pl)){total+=SCORE.inRound;bd.push({pick:i,pts:SCORE.inRound,lbl:"ir"});}
  }
  return{total,bd};
}
function getScores(){
  return Object.entries(S.allPicks)
    .map(([n,p])=>({name:n,...calcScore(p,S.actual)}))
    .sort((a,b)=>b.total-a.total);
}

async function fetchLive(){
  const filled=Object.values(S.adminPicks).filter(Boolean).length;
  const prompt=`Search the web RIGHT NOW for live 2026 NFL Draft Round 1 results happening tonight April 23 2026 in Pittsburgh. Find every pick officially announced so far. Draft order: 1-LV Raiders,2-NY Jets,3-ARI,4-TEN Titans,5-NY Giants,6-CLE Browns,7-WAS,8-NO Saints,9-KC Chiefs,10-NY Giants(CIN),11-MIA,12-DAL,13-LAR(ATL),14-BAL,15-TB,16-NYJ(IND),17-DET,18-MIN,19-CAR,20-DAL(GB),21-PIT,22-LAC,23-PHI,24-CLE(JAX),25-CHI,26-BUF,27-SF,28-HOU,29-KC(LAR),30-MIA(DEN),31-NE,32-SEA. Already have ${filled} picks. Return ONLY raw JSON: {"1":"Player Name"} no markdown.`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}]})
  });
  if(!res.ok)throw new Error(`API ${res.status}`);
  const data=await res.json();
  const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  const m=text.match(/\{[\s\S]*?\}/);
  if(!m)throw new Error("No JSON in response");
  const parsed=JSON.parse(m[0]);
  const result={};
  for(const[k,v]of Object.entries(parsed)){
    const n=parseInt(k);
    if(n>=1&&n<=32&&typeof v==="string"&&v.trim())result[n]=v.trim();
  }
  if(!Object.keys(result).length)throw new Error("No valid picks found");
  return result;
}

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="class")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else e.setAttribute(k,v);
  }
  for(const c of[children].flat().filter(Boolean)){
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
}
function btn(txt,cls,cb,dis=false){
  const b=el("button",{class:`btn ${cls}`,onClick:cb});
  b.textContent=txt;if(dis)b.disabled=true;return b;
}
function imgEl(src,sm=false){
  const i=document.createElement("img");
  i.src=src;i.alt="";if(sm)i.className="sm";
  i.onerror=()=>i.remove();return i;
}
function teamCell({team,via,ab},sm=false){
  const cell=el("div",{class:"team-cell"});

function getFilteredProspects(){
  const q=S.search.toLowerCase();
  const picks=S.view==="admin"?S.adminPicks:S.myPicks;
  let list=ALL_PROSPECTS;
  // Tab filter
  if(S.sidebarTab==="top32")list=list.filter(p=>p.top);
  else if(S.sidebarTab==="pos"&&S.posFilter!=="ALL")list=list.filter(p=>p.p===S.posFilter);
  // Text search
  if(q)list=list.filter(p=>
    p.n.toLowerCase().includes(q)||p.p.toLowerCase().includes(q)||
    p.s.toLowerCase().includes(q)||String(p.r).includes(q)
  );
  return{list,picks};
}

      pb.textContent=pos;pb.style.flex="0 0 auto";pb.style.padding="3px 6px";
      pf.appendChild(pb);

        if(used)return;
        const picks2=S.view==="admin"?S.adminPicks:S.myPicks;
        for(let i=1;i<=32;i++){if(!picks2[i]||!picks2[i].trim()){picks2[i]=p.n;render();break;}}
      });
      row.title="Drag to slot · Double-click to fill next empty slot";
    }
    container.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// PICK ROWS
// ═══════════════════════════════════════════════════════════════════════
function renderPickRow(draftSlot,picks,actual,readOnly,onDrop,onClear){
  const{pick,team,via,ab}=draftSlot;
  const score=Object.keys(actual).length?calcScore(picks,actual):null;
  const se=score?score.bd.find(b=>b.pick===pick):null;
  const filled=(picks[pick]||"").trim();

  const cls=`pick-row${se?se.lbl==="ex"?" exact-r":se.lbl==="1o"?" oneoff-r":se.lbl==="2o"?" twooff-r":" inrnd-r":""}`;
  const row=el("div",{class:cls});

  row.addEventListener("dragover",e=>{if(!readOnly){e.preventDefault();row.classList.add("drop-target");}});
  row.addEventListener("dragleave",()=>row.classList.remove("drop-target"));
  row.addEventListener("drop",()=>{
    row.classList.remove("drop-target");
    if(!readOnly&&S.dragName){onDrop(pick,S.dragName);S.dragName=null;}
  });

  // Number bubble
  row.appendChild(el("div",{class:`pick-num${filled?" filled-num":""}`},[String(pick)]));
  // Team
  row.appendChild(teamCell({team,via,ab}));
  // Slot
  if(filled){
    const sCls=`filled-slot${se?se.lbl==="ex"?" exact-s":se.lbl==="1o"?" oneoff-s":se.lbl==="2o"?" twooff-s":" inrnd-s":""}`;
    const slot=el("div",{class:sCls});
    slot.appendChild(el("span",{},[filled]));
    const right=el("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
    if(se){
      const badgeCls=`score-badge ${se.lbl==="ex"?"sb-ex":se.lbl==="1o"?"sb-1o":se.lbl==="2o"?"sb-2o":"sb-ir"}`;
      right.appendChild(el("span",{class:badgeCls},[`+${se.pts}`]));
    }
    const hasActual=Object.keys(actual).length>0;
    if(hasActual&&actual[pick]&&actual[pick].trim().toLowerCase()!==filled.toLowerCase()){
      right.appendChild(el("span",{style:{fontSize:"10px",color:"var(--dim)"}},[`→ ${actual[pick]}`]));
    }
    right.appendChild(el("span",{style:{fontSize:"11px",color:"var(--dim)"}},[readOnly?"🔒":"✕"]));
    slot.appendChild(right);
    if(!readOnly)slot.addEventListener("click",()=>onClear(pick));
    row.appendChild(slot);
  }else{
    const emp=el("div",{class:"empty-slot"},[readOnly?"— no pick —":"drag or type below"]);
    row.appendChild(emp);
  }
  return row;
}

    ));
  });

  const brow=el("div",{style:{marginTop:"20px",display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center"}});
  brow.appendChild(btn(S.saved?"✓ Saved!":"💾 Save to Scoreboard",S.saved?"btn-gr":"btn-or",saveActual));
  brow.appendChild(btn("← Back","btn-dk",()=>{S.user=null;S.view="home";render();}));
  brow.appendChild(el("span",{style:{fontSize:"11px",color:"var(--dim)"}},["Fetch auto-saves · Manual edits need Save"]));
  content.appendChild(brow);
  layout.appendChild(content);root.appendChild(layout);return root;
}

// ═══════════════════════════════════════════════════════════════════════
// CONFIRM MODAL
// ═══════════════════════════════════════════════════════════════════════
function renderModal(){
  const mr=document.getElementById("modal-root");mr.innerHTML="";
  if(!S.showConfirm||!S.fetchPreview)return;
  const bg=el("div",{class:"modal-bg"});
  const modal=el("div",{class:"modal"});
  modal.appendChild(el("div",{style:{fontSize:"16px",fontWeight:"800",color:"var(--gold)",letterSpacing:"2px",marginBottom:"4px"}},["FETCH PREVIEW"]));
  modal.appendChild(el("div",{style:{fontSize:"13px",color:"var(--dim)",marginBottom:"16px"}},[`Found ${S.fetchPreview.slots.length} change${S.fetchPreview.slots.length!==1?"s":""}:`]));
  const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"20px"}});
  S.fetchPreview.slots.forEach(s=>{
    const row=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"8px 12px",borderRadius:"7px",background:s.isNew?"rgba(34,197,94,0.08)":"rgba(240,180,41,0.08)",border:`1px solid ${s.isNew?"rgba(34,197,94,0.25)":"rgba(240,180,41,0.25)"}`}});
    row.appendChild(el("div",{style:{width:"28px",height:"28px",borderRadius:"50%",background:"linear-gradient(135deg,#1a243c,#243060)",border:"1px solid rgba(240,180,41,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"800",color:"var(--gold)",flexShrink:"0"}},[String(s.pick)]));
    const d=DRAFT_ORDER.find(o=>o.pick===s.pick);
    if(d){const img=imgEl(LOGO(d.ab));img.style.cssText="width:24px;height:24px;object-fit:contain";row.appendChild(img);}
    const info=el("div",{style:{flex:"1"}});
    info.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"700"}},[s.name]));
    if(!s.isNew)info.appendChild(el("div",{style:{fontSize:"11px",color:"var(--dim)"}},[`replaces: ${s.was}`]));
    row.appendChild(info);
    row.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"700",padding:"2px 8px",borderRadius:"8px",background:s.isNew?"rgba(34,197,94,0.2)":"rgba(240,180,41,0.2)",color:s.isNew?"var(--success)":"var(--gold)"}},[s.isNew?"NEW":"UPDATE"]));
    list.appendChild(row);
  });
  modal.appendChild(list);
  const btns=el("div",{style:{display:"flex",gap:"10px"}});
  btns.appendChild(btn("✓ Apply All Changes","btn-gr",confirmFetch));
  btns.appendChild(btn("Discard","btn-gy",()=>{S.showConfirm=false;S.fetchPreview=null;render();}));
  modal.appendChild(btns);bg.appendChild(modal);mr.appendChild(bg);
}

// ═══════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════
function navigate(view){S.view=view;render();}

function enterApp(){
  if(!S.nameInput.trim())return;
  S.user=S.nameInput.trim();S.myPicks=S.allPicks[S.user]||{};S.view="picks";render();
}

async function saveMyPicks(){
  if(!S.user||S.locked)return;
  if(S.fbOk){await fbSavePicks(S.user,S.myPicks);}
  else{localStorage.setItem(`picks_${S.user}`,JSON.stringify(S.myPicks));}
  S.saved=true;render();setTimeout(()=>{S.saved=false;render();},2200);
}

async function saveActual(){
  if(S.fbOk){await fbSaveActual(S.adminPicks);}
  else{localStorage.setItem("actual",JSON.stringify(S.adminPicks));}
  S.actual={...S.adminPicks};S.saved=true;render();
  setTimeout(()=>{S.saved=false;render();},2200);
}

async function doFetch(){
  S.fetching=true;S.fetchLog=null;S.showConfirm=false;render();
  try{
    const fetched=await fetchLive();
    const slots=[];const merged={...S.adminPicks};
    for(const[k,v]of Object.entries(fetched)){
      const n=parseInt(k);
      if(!merged[n]||!merged[n].trim()){merged[n]=v;slots.push({pick:n,name:v,isNew:true});}
      else if(merged[n].trim().toLowerCase()!==v.trim().toLowerCase()){slots.push({pick:n,name:v,was:merged[n],isNew:false});}
    }
    if(!slots.length){S.fetchLog={noChanges:true,ts:new Date().toLocaleTimeString()};}
    else{S.fetchPreview={merged,slots};S.showConfirm=true;}
  }catch(e){S.fetchLog={error:e.message,ts:new Date().toLocaleTimeString()};}
  S.fetching=false;render();
}

async function confirmFetch(){
  if(!S.fetchPreview)return;
  S.adminPicks=S.fetchPreview.merged;
  if(S.fbOk)await fbSaveActual(S.adminPicks);
  else{localStorage.setItem("actual",JSON.stringify(S.adminPicks));}
  S.actual={...S.adminPicks};
  S.fetchLog={newCount:S.fetchPreview.slots.filter(s=>s.isNew).length,slots:S.fetchPreview.slots,ts:new Date().toLocaleTimeString()};
  S.fetchPreview=null;S.showConfirm=false;render();
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let view;
  if(S.view==="home"||!S.user)view=renderHome();
  else if(S.view==="picks")view=renderPicks();
  else if(S.view==="board")view=renderBoard();
  else if(S.view==="admin")view=renderAdmin();
  if(view)app.appendChild(view);
  renderModal();
}

function renderNav(active){
  const nav=el("div",{class:"nav"});
  [["picks","My Picks"],["board","Leaderboard"]].forEach(([v,label])=>{
    const b=el("button",{class:active===v?"active":"",onClick:()=>navigate(v)});
    b.textContent=label;nav.appendChild(b);
  });
  const exitB=el("button",{onClick:()=>{S.user=null;S.view="home";render();}});
  exitB.textContent="← Exit";nav.appendChild(exitB);
  return nav;
}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
var unsubA, unsubP;

function fbListenActual(){
  if(unsubA)unsubA();
  unsubA=_listen(_doc(_db,"actual","round1"),snap=>{
    if(snap.exists()){S.actual=snap.data().actual||{};S.adminPicks={...S.actual};render();}
  });
}
function fbListenPicks(){
  if(unsubP)unsubP();
  unsubP=_listen(_col(_db,"picks"),snap=>{
    const all={};snap.forEach(d=>{all[d.id]=d.data().picks||{};});
    S.allPicks=all;
    if(S.user&&S.user!=="__admin__")S.myPicks=all[S.user]||S.myPicks;
    render();
  });
}

window.addEventListener("firebase-ready",async()=>{
  S.fbOk=window._firestoreReady===true;
  if(S.fbOk){
    fbInit();
    fbListenActual();
    fbListenPicks();
  }else{
    // Fallback to localStorage
    try{
      const a=localStorage.getItem("actual");if(a)S.actual=JSON.parse(a);
      const keys=Object.keys(localStorage).filter(k=>k.startsWith("picks_"));
      keys.forEach(k=>{try{S.allPicks[k.slice(6)]=JSON.parse(localStorage.getItem(k));}catch{}});
    }catch{}
  }

  document.getElementById("loading").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  render();

  // Countdown tick
  setInterval(()=>{
    const was=S.locked;S.cd=countdown();S.locked=isLocked();
    if(!was&&S.locked)render();
    else{
      document.querySelectorAll(".lock-banner").forEach(b=>{
        const cdEl=b.querySelector("[data-cd]");if(cdEl)cdEl.textContent=S.cd||"";
      });
    }
  },1000);
});


</script>
